name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # kessai's deps.edn uses :local/root "../card" etc. (sibling checkouts,
      # matching how the kotoba-lang repos are laid out in the west-managed
      # monorepo). actions/checkout can't place a repo outside
      # $GITHUB_WORKSPACE, so clone the siblings directly instead.
      - run: |
          git clone --depth 1 https://github.com/kotoba-lang/card ../card
          git clone --depth 1 https://github.com/kotoba-lang/banking ../banking
          git clone --depth 1 https://github.com/kotoba-lang/swift ../swift
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
